plugins {
    id 'java'
}

// 2. Adicione um repositório para o Gradle baixar as bibliotecas
repositories {
    mavenCentral()
}

// 3. Adicione o bloco de dependências com a grafia CORRETA
dependencies {
    // Dependência do JUnit 5 para seus testes
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'
}

test {
    useJUnitPlatform()
}